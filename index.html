<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mochila Escolar</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#0d47a1,#1976d2,#64b5f6);
margin:0;
padding:0;
color:white;
}

header{
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
width:90%;
max-width:800px;
margin:auto;
background:#1565c0;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

textarea{
width:100%;
height:100px;
border:none;
border-radius:10px;
padding:10px;
font-size:16px;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#42a5f5;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1e88e5;
}

.note{
background:#bbdefb;
color:#0d47a1;
padding:10px;
margin-top:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.delete{
background:#0d47a1;
color:white;
border:none;
padding:5px 10px;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<header>🎒 Mochila de Anotações Escolares</header>

<div class="container">

<textarea id="noteInput" placeholder="Escreva sua anotação escolar aqui..."></textarea>

<button onclick="addNote()">Guardar na Mochila</button>

<div id="notes"></div>

</div>

<script>

let notes = JSON.parse(localStorage.getItem("notes")) || [];

function renderNotes(){
const notesDiv = document.getElementById("notes");
notesDiv.innerHTML="";

notes.forEach((note,index)=>{
notesDiv.innerHTML += `
<div class="note">
<span>${note}</span>
<button class="delete" onclick="deleteNote(${index})">Excluir</button>
</div>
`;
});

}

function addNote(){
const input = document.getElementById("noteInput");
if(input.value.trim() === "") return;

notes.push(input.value);
localStorage.setItem("notes",JSON.stringify(notes));
input.value="";
renderNotes();
}

function deleteNote(index){
notes.splice(index,1);
localStorage.setItem("notes",JSON.stringify(notes));
renderNotes();
}

renderNotes();

</script>

</body>

<body>

<header>🎒 Mochila Escolar Digital</header>

<div class="tabs" id="tabs"></div>

<div class="container">

<h2 id="materiaTitulo"></h2>

<textarea id="noteInput" placeholder="Escreva sua anotação..."></textarea>

<button onclick="addNote()">Guardar na Mochila</button>

<div id="notes"></div>

</div>

<script>

const materias = [
"Matemática",
"Português",
"História",
"Geografia",
"Biologia",
"Química",
"Física",
"Inglês",
"Lógica de Programação",
"POO Java",
"AMC",
"Noção de Robótica",
"Programação Web",
"Sistemas Operacionais"
];

let materiaAtual = materias[0];

function criarAbas(){

const tabs = document.getElementById("tabs");

materias.forEach(m=>{
const btn = document.createElement("button");
btn.innerText = m;
btn.className="tab";
btn.onclick=()=>selecionarMateria(m);
tabs.appendChild(btn);
});

}

function selecionarMateria(m){

materiaAtual = m;

document.getElementById("materiaTitulo").innerText = m;

renderNotes();

}

function getNotes(){

return JSON.parse(localStorage.getItem(materiaAtual)) || [];

}

function saveNotes(notes){

localStorage.setItem(materiaAtual,JSON.stringify(notes));

}

function renderNotes(){

const notesDiv = document.getElementById("notes");
notesDiv.innerHTML="";

let notes = getNotes();

notes.forEach((note,index)=>{

notesDiv.innerHTML += `
<div class="note">
<span>${note}</span>
<button class="delete" onclick="deleteNote(${index})">Excluir</button>
</div>
`;

});

}

function addNote(){

const input = document.getElementById("noteInput");

if(input.value.trim()=="") return;

let notes = getNotes();

notes.push(input.value);

saveNotes(notes);

input.value="";

renderNotes();

}

function deleteNote(index){

let notes = getNotes();

notes.splice(index,1);

saveNotes(notes);

renderNotes();

}

criarAbas();
selecionarMateria(materias[0]);

</script>

</body>
