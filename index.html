<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mochila Escolar Digital</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0d47a1,#1565c0,#64b5f6);
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#0d47a1;
}

h1{
margin:0;
font-size:24px;
}

.container{
display:flex;
height:90vh;
}

.sidebar{
width:260px;
background:#0d47a1;
overflow-y:auto;
padding:10px;
}

/* PASTAS COM MAIS ESPAÇO */
.folder{
background:#1e88e5;
padding:18px;
margin:10px 0;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.folder:hover{
background:#42a5f5;
}

.main{
flex:1;
padding:20px;
background:#1565c0;
display:flex;
flex-direction:column;
}

textarea{
flex:1;
border:none;
border-radius:10px;
padding:10px;
font-size:16px;
resize:none;
}

button{
margin-top:8px;
padding:8px 12px;
border:none;
border-radius:8px;
background:#42a5f5;
color:white;
cursor:pointer;
}

button:hover{
background:#1e88e5;
}

.topbar{
margin-bottom:10px;
}

input{
padding:6px;
border-radius:6px;
border:none;
}

.agenda{
margin-top:10px;
background:#1e88e5;
padding:10px;
border-radius:10px;
}

.dark{
background:#121212;
}

.dark .sidebar{background:#1f1f1f}
.dark .main{background:#2b2b2b}
.dark .folder{background:#333}

</style>
</head>

<body>

<header>
<h1>🎒 Mochila Escolar</h1>
<button onclick="toggleDark()">🌙 Tema</button>
</header>

<div class="container">

<div class="sidebar" id="folders"></div>

<div class="main">

<div class="topbar">

<h2 id="folderTitle"></h2>

<input id="search" placeholder="Pesquisar..." onkeyup="searchNotes()">

<br>

<button onclick="saveNotes()">Salvar</button>
<button onclick="renameFolder()">Renomear Pasta</button>

</div>

<textarea id="notes"></textarea>

<div class="agenda">

<h3>📅 Agenda Escolar</h3>

<input id="agendaInput" placeholder="Adicionar tarefa">
<button onclick="addAgenda()">Adicionar</button>

<ul id="agendaList"></ul>

</div>

</div>

</div>

<script>

let folders = JSON.parse(localStorage.getItem("folders"));

if(!folders){

folders=[];

for(let i=1;i<=21;i++){
folders.push({name:"Pasta "+i,notes:""});
}

localStorage.setItem("folders",JSON.stringify(folders));

}

let agenda = JSON.parse(localStorage.getItem("agenda")) || [];

let current=0;

function renderFolders(){

let div=document.getElementById("folders");

div.innerHTML="";

folders.forEach((f,i)=>{

let item=document.createElement("div");

item.className="folder";

item.innerText=f.name;

item.onclick=()=>openFolder(i);

/* DUPLO CLIQUE PARA RENOMEAR */
item.ondblclick=()=>renameFolder();

div.appendChild(item);

});

}

function openFolder(i){

current=i;

document.getElementById("folderTitle").innerText=folders[i].name;

document.getElementById("notes").value=folders[i].notes;

}

function saveNotes(){

folders[current].notes=document.getElementById("notes").value;

localStorage.setItem("folders",JSON.stringify(folders));

alert("Salvo!");

}

function renameFolder(){

let name=prompt("Novo nome da pasta:");

if(name){

folders[current].name=name;

localStorage.setItem("folders",JSON.stringify(folders));

renderFolders();

openFolder(current);

}

}

function searchNotes(){

let text=document.getElementById("search").value.toLowerCase();

let note=document.getElementById("notes");

let content=folders[current].notes;

if(content.toLowerCase().includes(text)){

note.style.background="#e3f2fd";

}else{

note.style.background="white";

}

}

function toggleDark(){

document.body.classList.toggle("dark");

}

function renderAgenda(){

let ul=document.getElementById("agendaList");

ul.innerHTML="";

agenda.forEach((a,i)=>{

let li=document.createElement("li");

li.innerHTML=a+" <button onclick='removeAgenda("+i+")'>x</button>";

ul.appendChild(li);

});

}

function addAgenda(){

let input=document.getElementById("agendaInput");

if(input.value=="") return;

agenda.push(input.value);

localStorage.setItem("agenda",JSON.stringify(agenda));

input.value="";

renderAgenda();

}

function removeAgenda(i){

agenda.splice(i,1);

localStorage.setItem("agenda",JSON.stringify(agenda));

renderAgenda();

}

renderFolders();
openFolder(0);
renderAgenda();

</script>

</body>
</html>
